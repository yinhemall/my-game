<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { position: relative; width: 800px; height: 400px; border: 2px solid white; }
        canvas { display: block; background: #1a1a1a; }
        .ui-layer { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; pointer-events: none; }
        .hp-bar { width: 300px; height: 20px; border: 2px solid white; background: #333; }
        #p1-hp { height: 100%; width: 100%; background: cyan; }
        #p2-hp { height: 100%; width: 100%; background: red; }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="ui-layer">
            <div class="hp-bar"><div id="p1-hp"></div></div>
            <div class="hp-bar"><div id="p2-hp"></div></div>
        </div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    // 載入圖片
    const p1Img = new Image(); p1Img.src = 'player.PNG'; // 斗笠武士
    const p2Img = new Image(); p2Img.src = 'enemy.PNG';   // 紅面具武士

    let p1 = { x: 50, y: 150, hp: 100, frame: 0, attacking: false };
    let p2 = { x: 550, y: 150, hp: 100, frame: 0, attacking: false };

    function draw() {
        ctx.clearRect(0, 0, 800, 400);

        // 繪製 P1
        let s1 = p1.attacking ? p1.frame * 200 : 0;
        ctx.drawImage(p1Img, s1, 0, 200, 200, p1.x, p1.y, 200, 200);
        if (p1.attacking) {
            ctx.drawImage(p1Img, 0, 200, 400, 200, p1.x + 50, p1.y, 300, 200);
        }

        // 繪製 P2
        ctx.save();
        ctx.scale(-1, 1);
        let s2 = p2.attacking ? p2.frame * 200 : 0;
        ctx.drawImage(p2Img, s2, 0, 200, 200, -p2.x - 200, p2.y, 200, 200);
        if (p2.attacking) {
            ctx.drawImage(p2Img, 0, 200, 400, 200, -p2.x - 500, p2.y, 300, 200);
        }
        ctx.restore();

        requestAnimationFrame(draw);
    }

    // 觸控事件
    window.addEventListener('touchstart', (e) => {
        let touchX = e.touches[0].clientX;
        if(touchX < window.innerWidth / 2) {
            p1.attacking = true;
            setTimeout(() => p1.attacking = false, 400);
        } else {
            p2.attacking = true;
            setTimeout(() => p2.attacking = false, 400);
        }
    });

    p1Img.onload = p2Img.onload = draw;
</script>
</body>
</html>
