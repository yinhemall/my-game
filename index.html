<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 100vw; height: 50vw; border: 4px solid #fff; background: #000; }
        canvas { width: 100%; height: 100%; }
        /* 確保 UI 高於 Canvas */
        .hud { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; color: white; font-size: 20px; z-index: 10; }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="hud">
            <div>P1 HP: <span id="hp1">100</span></div>
            <div>P2 HP: <span id="hp2">100</span></div>
        </div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const p1Img = new Image(); p1Img.src = 'player.PNG';
    const p2Img = new Image(); p2Img.src = 'enemy.PNG';

    let p1 = { x: 50, y: 150, hp: 100, frame: 0, attacking: false };
    let p2 = { x: 550, y: 150, hp: 100, frame: 0, attacking: false };

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // P1 繪製：固定 200x200
        let s1 = p1.attacking ? p1.frame * 200 : 0;
        ctx.drawImage(p1Img, s1, 0, 200, 200, p1.x, p1.y, 200, 200);
        
        // 【關鍵診斷】：如果這行畫不出來，代表 Y=200 之後沒有東西或沒讀取到
        if(p1.attacking) {
            ctx.fillStyle = "red"; // 先畫一個紅框確認位置
            ctx.fillRect(p1.x + 50, p1.y, 300, 200); 
            ctx.drawImage(p1Img, 0, 200, 400, 200, p1.x + 50, p1.y, 300, 200);
        }

        // P2 翻轉
        ctx.save(); ctx.scale(-1, 1);
        let s2 = p2.attacking ? p2.frame * 200 : 0;
        ctx.drawImage(p2Img, s2, 0, 200, 200, -p2.x - 250, p2.y, 200, 200);
        if(p2.attacking) {
            ctx.drawImage(p2Img, 0, 200, 400, 200, -p2.x - 550, p2.y, 300, 200);
        }
        ctx.restore();

        requestAnimationFrame(draw);
    }
    // ... 後續邏輯
</script>
</body>
</html>
