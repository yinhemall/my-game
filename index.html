<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 800px; height: 400px; border: 4px solid #fff; }
        canvas { width: 100%; height: 100%; display: block; }
        .hud { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; color: white; font-size: 20px; font-weight: bold; pointer-events: none; }
        .hp-bar { width: 300px; height: 20px; background: #444; border: 2px solid #fff; }
        #hp1-fill { height: 100%; width: 100%; background: cyan; transition: width 0.3s; }
        #hp2-fill { height: 100%; width: 100%; background: red; transition: width 0.3s; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div>P1 HP<div class="hp-bar"><div id="hp1-fill" style="width:100%"></div></div></div>
        <div>P2 HP<div class="hp-bar"><div id="hp2-fill" style="width:100%"></div></div></div>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const p1Img = new Image(); p1Img.src = 'player.PNG';
    const p2Img = new Image(); p2Img.src = 'enemy.PNG';

    let p1 = { x: 50, y: 150, hp: 100, frame: 0, attacking: false };
    let p2 = { x: 550, y: 150, hp: 100, frame: 0, attacking: false };

    function draw() {
        ctx.clearRect(0, 0, 800, 400);

        // 繪製 P1
        let s1 = p1.attacking ? p1.frame * 200 : 0;
        ctx.drawImage(p1Img, s1, 0, 200, 200, p1.x, p1.y, 200, 200);
        if(p1.attacking) ctx.drawImage(p1Img, 0, 200, 400, 200, p1.x + 50, p1.y - 20, 300, 200);

        // 繪製 P2
        ctx.save(); ctx.scale(-1, 1);
        let s2 = p2.attacking ? p2.frame * 200 : 0;
        ctx.drawImage(p2Img, s2, 0, 200, 200, -p2.x - 250, p2.y, 200, 200);
        if(p2.attacking) ctx.drawImage(p2Img, 0, 200, 400, 200, -p2.x - 550, p2.y - 20, 300, 200);
        ctx.restore();

        requestAnimationFrame(draw);
    }

    function triggerAttack(attacker, target, hpId) {
        if(attacker.attacking) return;
        attacker.attacking = true;
        
        // 扣血邏輯
        target.hp -= 20;
        document.getElementById(hpId).style.width = target.hp + "%";
        
        // 動畫幀循環 (共4幀)
        let f = 0;
        let anim = setInterval(() => {
            attacker.frame = f++;
            if(f >= 4) { 
                clearInterval(anim); 
                attacker.attacking = false; 
                attacker.frame = 0; 
            }
        }, 100);
    }

    window.addEventListener('touchstart', (e) => {
        let touchX = e.touches[0].clientX / window.innerWidth * 800;
        if(touchX < 400) triggerAttack(p1, p2, "hp2-fill");
        else triggerAttack(p2, p1, "hp1-fill");
    });

    p1Img.onload = p2Img.onload = draw;
</script>
</body>
</html>
