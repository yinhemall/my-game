<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #gameCanvas { display: block; width: 100vw; height: 50vw; }
        #orientation-msg { display: none; color: white; font-size: 24px; text-align: center; }
        @media screen and (orientation: portrait) {
            #gameCanvas { display: none; }
            #orientation-msg { display: block; }
        }
    </style>
</head>
<body>
    <div id="orientation-msg">請將手機轉為橫向以遊玩！</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const p1Img = new Image(); p1Img.src = 'player.PNG';
        const p2Img = new Image(); p2Img.src = 'enemy.PNG';

        let p1 = { x: 50, y: 50, w: 250, h: 250, hp: 100, isAttacking: false };
        let p2 = { x: 500, y: 50, w: 250, h: 250, hp: 100, isAttacking: false };
        let gameOver = false;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 繪製角色
            if (p1Img.complete) ctx.drawImage(p1Img, p1.x, p1.y, p1.w, p1.h);
            if (p1.isAttacking) { ctx.fillStyle = "yellow"; ctx.fillRect(p1.x + 200, p1.y + 100, 150, 50); }
            
            ctx.save();
            ctx.scale(-1, 1);
            if (p2Img.complete) ctx.drawImage(p2Img, -p2.x - p2.w, p2.y, p2.w, p2.h);
            ctx.restore();
            if (p2.isAttacking) { ctx.fillStyle = "red"; ctx.fillRect(p2.x - 150, p2.y + 100, 150, 50); }

            // 顯示血量
            ctx.fillStyle = "white";
            ctx.font = "bold 50px Arial"; 
            ctx.fillText("P1 HP: " + p1.hp, 50, 70);
            ctx.fillText("P2 HP: " + p2.hp, 500, 70);

            // 勝負判定顯示
            if (gameOver) {
                ctx.fillStyle = "gold";
                ctx.font = "bold 80px Arial";
                let winner = (p1.hp > 0) ? "PLAYER 1 WINS!" : "PLAYER 2 WINS!";
                ctx.fillText(winner, 100, 250);
            }
            
            if (!gameOver) requestAnimationFrame(draw);
        }

        window.addEventListener('touchstart', (e) => {
            if (gameOver) return; // 遊戲結束後點擊無效

            let touchX = (e.touches[0].clientX / window.innerWidth) * canvas.width;
            if (touchX < 400) {
                p1.isAttacking = true;
                p2.hp = Math.max(0, p2.hp - 5);
                if (p2.hp === 0) gameOver = true;
                setTimeout(() => { p1.isAttacking = false; }, 200);
            } else {
                p2.isAttacking = true;
                p1.hp = Math.max(0, p1.hp - 5);
                if (p1.hp === 0) gameOver = true;
                setTimeout(() => { p2.isAttacking = false; }, 200);
            }
        });

        p1Img.onload = draw;
        p2Img.onload = draw;
        draw();
    </script>
</body>
</html>
