<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 800px; height: 400px; border: 4px solid #fff; background: #000; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* UI HUD 層 */
        .hud { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; pointer-events: none; }
        .hp-bar { width: 300px; height: 20px; border: 2px solid #fff; background: #222; }
        #hp1-fill { height: 100%; width: 100%; background: cyan; transition: width 0.2s; }
        #hp2-fill { height: 100%; width: 100%; background: red; transition: width 0.2s; }
        
        /* 勝負重啟 */
        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; color:#fff; font-size:48px; cursor:pointer; z-index:100; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div class="hp-bar"><div id="hp1-fill" style="width:100%"></div></div>
        <div class="hp-bar"><div id="hp2-fill" style="width:100%"></div></div>
    </div>
    <div id="overlay" onclick="location.reload()">REMATCH</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const p1Img = new Image(); p1Img.src = 'player.PNG';
    const p2Img = new Image(); p2Img.src = 'enemy.PNG';

    let p1 = { x: 50, y: 150, hp: 100, frame: 0, attacking: false };
    let p2 = { x: 550, y: 150, hp: 100, frame: 0, attacking: false };
    let gameOver = false;

    function draw() {
        ctx.clearRect(0, 0, 800, 400);

        // P1 繪製：動作 (上方) + 特效 (下方 Y=200)
        let s1 = p1.attacking ? p1.frame * 200 : 0;
        ctx.drawImage(p1Img, s1, 0, 200, 200, p1.x, p1.y, 200, 200);
        if(p1.attacking) ctx.drawImage(p1Img, 0, 200, 400, 200, p1.x + 50, p1.y - 20, 300, 200);

        // P2 繪製：動作 (上方) + 特效 (下方 Y=200)
        ctx.save(); ctx.scale(-1, 1);
        let s2 = p2.attacking ? p2.frame * 200 : 0;
        ctx.drawImage(p2Img, s2, 0, 200, 200, -p2.x - 250, p2.y, 200, 200);
        if(p2.attacking) ctx.drawImage(p2Img, 0, 200, 400, 200, -p2.x - 550, p2.y - 20, 300, 200);
        ctx.restore();

        if(!gameOver) requestAnimationFrame(draw);
    }

    function attack(attacker, target, hpId) {
        if(attacker.attacking || gameOver) return;
        attacker.attacking = true;
        target.hp -= 20;
        document.getElementById(hpId).style.width = target.hp + "%";
        if(target.hp <= 0) { gameOver = true; document.getElementById("overlay").style.display = "flex"; }
        
        let f = 0;
        let anim = setInterval(() => {
            attacker.frame = f++;
            if(f >= 4) { clearInterval(anim); attacker.attacking = false; }
        }, 100);
    }

    window.addEventListener('touchstart', (e) => {
        let touchX = e.touches[0].clientX / window.innerWidth * 800;
        if(touchX < 400) attack(p1, p2, "hp2-fill");
        else attack(p2, p1, "hp1-fill");
    });

    p1Img.onload = p2Img.onload = draw;
</script>
</body>
</html>
