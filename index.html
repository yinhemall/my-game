<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samurai Duel</title>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 100%; max-width: 800px; aspect-ratio: 2/1; border: 4px solid #fff; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        
        /* UI 層：確保在畫布最上層 */
        .hud { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; pointer-events: none; z-index: 10; }
        .hp-bar { width: 40%; height: 20px; border: 3px solid #fff; background: #333; }
        #hp1-fill { height: 100%; width: 100%; background: cyan; transition: width 0.2s; }
        #hp2-fill { height: 100%; width: 100%; background: red; transition: width 0.2s; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div class="hp-bar"><div id="hp1-fill"></div></div>
        <div class="hp-bar"><div id="hp2-fill"></div></div>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const p1Img = new Image(); p1Img.src = 'player.PNG'; 
    const p2Img = new Image(); p2Img.src = 'enemy.PNG';

    let p1 = { x: 50, y: 150, hp: 100, frame: 0, attacking: false };
    let p2 = { x: 550, y: 150, hp: 100, frame: 0, attacking: false };

    function draw() {
        ctx.clearRect(0, 0, 800, 400);

        // --- 繪製 P1 (斗笠) ---
        let s1 = p1.attacking ? p1.frame * 200 : 0;
        ctx.drawImage(p1Img, s1, 0, 200, 200, p1.x, p1.y, 200, 200);
        if(p1.attacking) {
            ctx.drawImage(p1Img, 0, 200, 400, 200, p1.x + 50, p1.y - 20, 300, 200);
        }

        // --- 繪製 P2 (紅面具 - 水平翻轉) ---
        ctx.save();
        ctx.scale(-1, 1);
        let s2 = p2.attacking ? p2.frame * 200 : 0;
        // 注意：翻轉後 X 座標必須是負的
        ctx.drawImage(p2Img, s2, 0, 200, 200, -p2.x - 250, p2.y, 200, 200);
        if(p2.attacking) {
            ctx.drawImage(p2Img, 0, 200, 400, 200, -p2.x - 550, p2.y - 20, 300, 200);
        }
        ctx.restore();

        requestAnimationFrame(draw);
    }

    // 觸控攻擊邏輯
    window.addEventListener('touchstart', (e) => {
        let touchX = e.touches[0].clientX / window.innerWidth * 800;
        if(touchX < 400) {
            if(!p1.attacking) {
                p1.attacking = true;
                let f = 0;
                let i = setInterval(() => { p1.frame = f++; if(f > 3) { clearInterval(i); p1.attacking = false; } }, 100);
            }
        } else {
            if(!p2.attacking) {
                p2.attacking = true;
                let f = 0;
                let i = setInterval(() => { p2.frame = f++; if(f > 3) { clearInterval(i); p2.attacking = false; } }, 100);
            }
        }
    });

    p1Img.onload = p2Img.onload = draw;
</script>
</body>
</html>
