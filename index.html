<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #gameCanvas { background: #000; width: 100vw; height: 50vw; }
        #orientation-msg { display: none; color: white; font-size: 20px; text-align: center; }
        @media screen and (orientation: portrait) {
            #gameCanvas { display: none; }
            #orientation-msg { display: block; }
        }
    </style>
</head>
<body>
    <div id="orientation-msg">請將手機轉為橫向以遊玩！</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const p1Img = new Image(); p1Img.src = 'player.png';
        const p2Img = new Image(); p2Img.src = 'enemy.png';

        let p1 = { x: 50, y: 100, frame: 0, isAttacking: false, hp: 100 };
        let p2 = { x: 550, y: 100, frame: 0, isAttacking: false, hp: 100 };
        let gameOver = false;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 繪製 P1
            let p1Sx = p1.isAttacking ? p1.frame * 200 : 0;
            ctx.drawImage(p1Img, p1Sx, 0, 200, 200, p1.x, p1.y, 200, 200);
            if (p1.isAttacking) { // 繪製藍色劍氣 (假設特效在圖片 y=200 的位置)
                ctx.drawImage(p1Img, 0, 200, 400, 200, p1.x + 100, p1.y, 400, 200);
            }

            // 繪製 P2
            ctx.save();
            ctx.scale(-1, 1);
            let p2Sx = p2.isAttacking ? p2.frame * 200 : 0;
            ctx.drawImage(p2Img, p2Sx, 0, 200, 200, -p2.x - 200, p2.y, 200, 200);
            if (p2.isAttacking) { // 繪製黃色劍氣
                ctx.drawImage(p2Img, 0, 200, 400, 200, -p2.x - 300, p2.y, 400, 200);
            }
            ctx.restore();

            // 血量與勝負
            ctx.fillStyle = "white"; ctx.font = "30px Arial";
            ctx.fillText("P1 HP: " + p1.hp, 50, 50);
            ctx.fillText("P2 HP: " + p2.hp, 600, 50);

            if (gameOver) ctx.fillText("GAME OVER", 300, 200);
            else requestAnimationFrame(draw);
        }

        function triggerAttack(attacker, target) {
            if (attacker.isAttacking) return;
            attacker.isAttacking = true;
            attacker.frame = 0;
            target.hp = Math.max(0, target.hp - 10);
            if (target.hp <= 0) gameOver = true;
            
            let count = 0;
            let timer = setInterval(() => {
                attacker.frame++;
                if (count++ >= 3) {
                    clearInterval(timer);
                    attacker.isAttacking = false;
                    attacker.frame = 0;
                }
            }, 100);
        }

        window.addEventListener('touchstart', (e) => {
            if (gameOver) return;
            if (e.touches[0].clientX < window.innerWidth / 2) triggerAttack(p1, p2);
            else triggerAttack(p2, p1);
        });

        p1Img.onload = draw; p2Img.onload = draw;
    </script>
</body>
</html>
