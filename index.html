<!DOCTYPE html>
<html>
<body style="background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <canvas id="gameCanvas" width="400" height="200" style="border: 2px solid white; background: #000;"></canvas>
    <script>
        const CANVAS = document.getElementById("gameCanvas");
        const CTX = CANVAS.getContext("2d");

        // 這裡對應你上傳的大寫 .PNG 檔名
        const P1_IMG = new Image(); P1_IMG.src = 'PLAYER.PNG';
        const P2_IMG = new Image(); P2_IMG.src = 'ENEMY.PNG';

        let p1 = { x: 50, y: 100, w: 60, h: 80, hp: 100 };
        let p2 = { x: 280, y: 100, w: 60, h: 80, hp: 100 };

        function draw() {
            CTX.clearRect(0, 0, CANVAS.width, CANVAS.height);
            
            // 畫 P1 (正常)
            if (P1_IMG.complete) CTX.drawImage(P1_IMG, p1.x, p1.y, p1.w, p1.h);
            
            // 畫 P2 (水平翻轉，讓它面對 P1)
            if (P2_IMG.complete) {
                CTX.save();
                CTX.scale(-1, 1);
                CTX.drawImage(P2_IMG, -p2.x - p2.w, p2.y, p2.w, p2.h);
                CTX.restore();
            }

            // 血條顯示
            CTX.fillStyle = "white";
            CTX.fillText("P1 HP: " + p1.hp, 10, 20);
            CTX.fillText("P2 HP: " + p2.hp, 340, 20);
            requestAnimationFrame(draw);
        }

        // 點擊事件
        window.addEventListener('touchstart', (e) => {
            if (e.touches[0].clientX < 200) p2.hp -= 5;
            else p1.hp -= 5;
        });

        draw();
    </script>
</body>
</html>
