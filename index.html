<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #gameCanvas { display: block; width: 100vw; height: 100vh; }

        /* 當手機是直向時，強制將整個畫面旋轉 90 度 */
        @media screen and (orientation: portrait) {
            body {
                transform: rotate(90deg);
                transform-origin: left top;
                width: 100vh;
                height: 100vw;
                position: absolute;
                top: 0;
                left: 0;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // 這裡確保絕對路徑，避開 GitHub 路徑解析問題
        const p1Img = new Image(); p1Img.src = 'https://yinhemall.github.io/my-game/player.PNG';
        const p2Img = new Image(); p2Img.src = 'https://yinhemall.github.io/my-game/enemy.PNG';

        let p1 = { x: 50, y: 100, w: 200, h: 200, hp: 100, isAttacking: false };
        let p2 = { x: 550, y: 100, w: 200, h: 200, hp: 100, isAttacking: false };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (p1Img.complete) ctx.drawImage(p1Img, p1.x, p1.y, p1.w, p1.h);
            if (p1.isAttacking) { ctx.fillStyle = "yellow"; ctx.fillRect(p1.x + 180, p1.y + 80, 120, 40); }
            
            ctx.save();
            ctx.scale(-1, 1);
            if (p2Img.complete) ctx.drawImage(p2Img, -p2.x - p2.w, p2.y, p2.w, p2.h);
            ctx.restore();
            if (p2.isAttacking) { ctx.fillStyle = "red"; ctx.fillRect(p2.x - 120, p2.y + 80, 120, 40); }

            ctx.fillStyle = "white";
            ctx.font = "bold 50px Arial"; 
            ctx.fillText("P1 HP: " + p1.hp, 50, 70);
            ctx.fillText("P2 HP: " + p2.hp, 500, 70);
            requestAnimationFrame(draw);
        }

        window.addEventListener('touchstart', (e) => {
            let touchX = (e.touches[0].clientX / window.innerWidth) * canvas.width;
            if (touchX < 400) {
                p1.isAttacking = true; p2.hp -= 5;
                setTimeout(() => { p1.isAttacking = false; }, 200);
            } else {
                p2.isAttacking = true; p1.hp -= 5;
                setTimeout(() => { p2.isAttacking = false; }, 200);
            }
        });

        p1Img.onload = draw;
        p2Img.onload = draw;
        draw();
    </script>
</body>
</html>
