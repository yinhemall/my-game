<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samurai Duel</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 800px; height: 400px; border: 2px solid #333; }
        #gameCanvas { display: block; width: 100%; height: 100%; background: #000; }
        .hud { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; color: white; font-family: sans-serif; }
        .hp-bar { width: 300px; height: 20px; background: #444; border: 2px solid #fff; }
        .hp-fill { height: 100%; width: 100%; transition: width 0.3s; }
        #hp1-fill { background: #00d2ff; }
        #hp2-fill { background: #ffcc00; float: right; } /* 修正為黃色 */
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div>P1 HP<div class="hp-bar"><div id="hp1-fill" class="hp-fill"></div></div></div>
        <div>P2 HP<div class="hp-bar"><div id="hp2-fill" class="hp-fill"></div></div></div>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const p1Img = new Image(); p1Img.src = 'player.PNG'; // 藍衣武士
    const p2Img = new Image(); p2Img.src = 'enemy.PNG'; // 紅衣流浪者

    let p1 = { x: 50, y: 150, frame: 0, isAttacking: false, hp: 100 };
    let p2 = { x: 550, y: 150, frame: 0, isAttacking: false, hp: 100 };
    let gameOver = false;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 繪製 P1 (藍衣武士 - 使用 player.PNG)
        let p1Sx = p1.isAttacking ? p1.frame * 200 : 0;
        ctx.drawImage(p1Img, p1Sx, 0, 200, 200, p1.x, p1.y, 200, 200);
        if (p1.isAttacking) {
            ctx.globalCompositeOperation = 'screen';
            ctx.drawImage(p1Img, 0, 200, 400, 200, p1.x + 50, p1.y - 20, 300, 200); // 藍色劍氣
            ctx.globalCompositeOperation = 'source-over';
        }

        // 2. 繪製 P2 (紅衣流浪者 - 使用 enemy.PNG)
        ctx.save();
        ctx.scale(-1, 1);
        let p2Sx = p2.isAttacking ? p2.frame * 200 : 0;
        ctx.drawImage(p2Img, p2Sx, 0, 200, 200, -p2.x - 250, p2.y, 200, 200);
        if (p2.isAttacking) {
            ctx.globalCompositeOperation = 'screen';
            ctx.drawImage(p2Img, 0, 200, 400, 200, -p2.x - 450, p2.y - 20, 300, 200); // 黃色劍氣 (Enemy的圖檔)
            ctx.globalCompositeOperation = 'source-over';
        }
        ctx.restore();

        if (!gameOver) requestAnimationFrame(draw);
    }

    function attack(attacker, target, hpId) {
        if (attacker.isAttacking) return;
        attacker.isAttacking = true;
        attacker.frame = 0;
        target.hp -= 10;
        document.getElementById(hpId).style.width = target.hp + "%";
        
        let count = 0;
        let timer = setInterval(() => {
            attacker.frame++;
            if (count++ >= 3) {
                clearInterval(timer);
                attacker.isAttacking = false;
            }
        }, 100);
    }

    window.addEventListener('touchstart', (e) => {
        if (e.touches[0].clientX < 400) attack(p1, p2, "hp2-fill");
        else attack(p2, p1, "hp1-fill");
    });

    let loaded = 0;
    const check = () => { if (++loaded === 2) draw(); };
    p1Img.onload = check; p2Img.onload = check;
</script>
</body>
</html>
