<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 800px; height: 400px; border: 4px solid #fff; }
        canvas { width: 100%; height: 100%; display: block; }
        .hud { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; color: white; z-index: 10; }
        .hp-bar { width: 300px; height: 20px; background: #333; border: 2px solid #fff; }
        #hp1-fill { height: 100%; width: 100%; background: cyan; }
        #hp2-fill { height: 100%; width: 100%; background: red; }
    </style>
</head>
<body>
<div id="game-container">
    <div class="hud">
        <div>P1 HP<div class="hp-bar"><div id="hp1-fill" style="width:100%"></div></div></div>
        <div>P2 HP<div class="hp-bar"><div id="hp2-fill" style="width:100%"></div></div></div>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const p1Img = new Image(); p1Img.src = 'player.PNG';
    const p2Img = new Image(); p2Img.src = 'enemy.PNG';

    // 每個角色的設定：[動作格寬度, 特效Y軸位置]
    const settings = {
        p1: { w: 200, effectY: 300 }, // 請根據原圖特效在哪一行調整
        p2: { w: 200, effectY: 300 }
    };

    let p1 = { x: 100, y: 150, hp: 100, frame: 0, attacking: false };
    let p2 = { x: 500, y: 150, hp: 100, frame: 0, attacking: false };

    function draw() {
        ctx.clearRect(0, 0, 800, 400);

        // 繪製 P1
        let s1 = p1.attacking ? p1.frame * 200 : 0;
        ctx.drawImage(p1Img, s1, 0, 200, 200, p1.x, p1.y, 200, 200);
        if(p1.attacking) {
            // 使用 drawImage(image, sx, sy, sWidth, sHeight, dx, dy, dWidth, dHeight)
            // 將 sy 改為特效實際所在的高度
            ctx.drawImage(p1Img, 0, 250, 400, 150, p1.x + 50, p1.y, 300, 150);
        }

        // 繪製 P2
        ctx.save(); ctx.scale(-1, 1);
        let s2 = p2.attacking ? p2.frame * 200 : 0;
        ctx.drawImage(p2Img, s2, 0, 200, 200, -p2.x - 200, p2.y, 200, 200);
        if(p2.attacking) {
            ctx.drawImage(p2Img, 0, 250, 400, 150, -p2.x - 500, p2.y, 300, 150);
        }
        ctx.restore();

        requestAnimationFrame(draw);
    }

    // 觸控邏輯
    window.addEventListener('touchstart', (e) => {
        let touchX = e.touches[0].clientX / window.innerWidth * 800;
        if(touchX < 400) { p1.attacking = true; setTimeout(() => p1.attacking = false, 400); }
        else { p2.attacking = true; setTimeout(() => p2.attacking = false, 400); }
    });

    p1Img.onload = p2Img.onload = draw;
</script>
</body>
</html>
