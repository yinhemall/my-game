<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        /* 強制畫布填滿螢幕 */
        #gameCanvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const p1Img = new Image(); p1Img.src = './player.PNG';
        const p2Img = new Image(); p2Img.src = './enemy.PNG';

        // 放大角色設定 (w: 200, h: 200)
        let p1 = { x: 50, y: 100, w: 200, h: 200, hp: 100, isAttacking: false };
        let p2 = { x: 550, y: 100, w: 200, h: 200, hp: 100, isAttacking: false };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 繪製 P1
            if (p1Img.complete) ctx.drawImage(p1Img, p1.x, p1.y, p1.w, p1.h);
            if (p1.isAttacking) {
                ctx.fillStyle = "yellow";
                ctx.fillRect(p1.x + 180, p1.y + 80, 120, 40);
            }
            
            // 繪製 P2
            if (p2Img.complete) {
                ctx.save();
                ctx.scale(-1, 1);
                ctx.drawImage(p2Img, -p2.x - p2.w, p2.y, p2.w, p2.h);
                ctx.restore();
            }
            if (p2.isAttacking) {
                ctx.fillStyle = "red";
                ctx.fillRect(p2.x - 120, p2.y + 80, 120, 40);
            }

            // 放大文字
            ctx.fillStyle = "white";
            ctx.font = "bold 50px Arial"; 
            ctx.fillText("P1 HP: " + p1.hp, 50, 70);
            ctx.fillText("P2 HP: " + p2.hp, 500, 70);
            
            requestAnimationFrame(draw);
        }

        window.addEventListener('touchstart', (e) => {
            // 自動計算點擊位置比例，確保不管螢幕多大都準確
            let touchX = (e.touches[0].clientX / window.innerWidth) * canvas.width;
            if (touchX < 400) {
                p1.isAttacking = true;
                p2.hp -= 5;
                setTimeout(() => { p1.isAttacking = false; }, 200);
            } else {
                p2.isAttacking = true;
                p1.hp -= 5;
                setTimeout(() => { p2.isAttacking = false; }, 200);
            }
        });

        p1Img.onload = draw;
        p2Img.onload = draw;
        draw();
    </script>
</body>
</html>
