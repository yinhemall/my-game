<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 800px; height: 400px; border: 4px solid #fff; }
        .hud { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; color: white; font-size: 24px; font-weight: bold; }
        .hp-bar { width: 300px; height: 20px; background: #444; border: 2px solid #fff; }
        #hp1-fill { height: 100%; width: 100%; background: cyan; }
        #hp2-fill { height: 100%; width: 100%; background: yellow; }
        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; color:white; font-size:50px; z-index:100; cursor: pointer; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div>PLAYER 1 HP <div class="hp-bar"><div id="hp1-fill" style="width:100%"></div></div></div>
        <div>ENEMY HP <div class="hp-bar"><div id="hp2-fill" style="width:100%"></div></div></div>
    </div>
    <div id="overlay" onclick="location.reload()">REMATCH</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    // 確保你 GitHub 的檔名與此完全一致
    const p1Img = new Image(); p1Img.src = 'player.PNG';
    const p2Img = new Image(); p2Img.src = 'enemy.PNG';

    let p1 = { x: 50, y: 150, hp: 100, frame: 0, attacking: false };
    let p2 = { x: 550, y: 150, hp: 100, frame: 0, attacking: false };
    let gameOver = false;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // P1: 畫角色 (上方) 與特效 (下方)
        let sx1 = p1.attacking ? p1.frame * 200 : 0;
        ctx.drawImage(p1Img, sx1, 0, 200, 200, p1.x, p1.y, 200, 200);
        if(p1.attacking) {
            // 強制只用 p1Img 繪製
            ctx.drawImage(p1Img, 0, 200, 400, 200, p1.x + 50, p1.y - 20, 300, 200);
        }

        // P2: 畫角色 (上方) 與特效 (下方)
        ctx.save(); ctx.scale(-1, 1);
        let sx2 = p2.attacking ? p2.frame * 200 : 0;
        ctx.drawImage(p2Img, sx2, 0, 200, 200, -p2.x - 250, p2.y, 200, 200);
        if(p2.attacking) {
            // 強制只用 p2Img 繪製，確保顏色不混淆
            ctx.drawImage(p2Img, 0, 200, 400, 200, -p2.x - 550, p2.y - 20, 300, 200);
        }
        ctx.restore();

        if(!gameOver) requestAnimationFrame(draw);
    }

    // 遊戲邏輯保持不變
    function attack(attacker, target, id) {
        if(attacker.attacking) return;
        attacker.attacking = true;
        target.hp -= 20;
        document.getElementById(id).style.width = target.hp + "%";
        if(target.hp <= 0) { gameOver = true; document.getElementById("overlay").style.display = "flex"; }
        
        let f = 0;
        let i = setInterval(() => {
            attacker.frame = f++;
            if(f > 3) { clearInterval(i); attacker.attacking = false; }
        }, 100);
    }

    window.addEventListener('touchstart', (e) => {
        if(e.touches[0].clientX < 400) attack(p1, p2, "hp2-fill");
        else attack(p2, p1, "hp1-fill");
    });
    p1Img.onload = p2Img.onload = draw;
</script>
</body>
</html>
