<!DOCTYPE html>
<html>
<body style="background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <canvas id="gameCanvas" width="400" height="200" style="border: 2px solid white; background: #000;"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // 使用 ./ 開頭，這是 GitHub Pages 讀取同資料夾檔案的標準語法
        const p1Img = new Image(); p1Img.src = './player.PNG';
        const p2Img = new Image(); p2Img.src = './enemy.PNG';

        let p1 = { x: 50, y: 100, w: 60, h: 80, hp: 100, isAttacking: false };
        let p2 = { x: 280, y: 100, w: 60, h: 80, hp: 100, isAttacking: false };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 繪製 P1
            if (p1Img.complete) ctx.drawImage(p1Img, p1.x, p1.y, p1.w, p1.h);
            if (p1.isAttacking) {
                ctx.fillStyle = "yellow";
                ctx.fillRect(p1.x + 50, p1.y + 20, 40, 10);
            }
            
            // 繪製 P2
            if (p2Img.complete) {
                ctx.save();
                ctx.scale(-1, 1);
                ctx.drawImage(p2Img, -p2.x - p2.w, p2.y, p2.w, p2.h);
                ctx.restore();
            }
            if (p2.isAttacking) {
                ctx.fillStyle = "red";
                ctx.fillRect(p2.x - 40, p2.y + 20, 40, 10);
            }

            // 血條
            ctx.fillStyle = "white";
            ctx.font = "16px Arial";
            ctx.fillText("P1 HP: " + p1.hp, 10, 20);
            ctx.fillText("P2 HP: " + p2.hp, 340, 20);
            
            requestAnimationFrame(draw);
        }

        window.addEventListener('touchstart', (e) => {
            if (e.touches[0].clientX < 200) {
                p1.isAttacking = true;
                p2.hp -= 5;
                setTimeout(() => { p1.isAttacking = false; }, 200);
            } else {
                p2.isAttacking = true;
                p1.hp -= 5;
                setTimeout(() => { p2.isAttacking = false; }, 200);
            }
        });

        // 圖片載入完成後觸發繪製
        p1Img.onload = draw;
        p2Img.onload = draw;
        draw();
    </script>
</body>
</html>
