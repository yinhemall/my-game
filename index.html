<!DOCTYPE html>
<html>
<body style="background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <canvas id="gameCanvas" width="800" height="400" style="border: 4px solid white; background: #000;"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const p1Img = new Image(); p1Img.src = './player.PNG';
        const p2Img = new Image(); p2Img.src = './enemy.PNG';

        // 放大角色尺寸 (w: 120, h: 160)
        let p1 = { x: 100, y: 150, w: 120, h: 160, hp: 100, isAttacking: false };
        let p2 = { x: 580, y: 150, w: 120, h: 160, hp: 100, isAttacking: false };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 繪製 P1
            if (p1Img.complete) ctx.drawImage(p1Img, p1.x, p1.y, p1.w, p1.h);
            if (p1.isAttacking) {
                ctx.fillStyle = "yellow";
                ctx.fillRect(p1.x + 100, p1.y + 40, 80, 20); // 特效放大
            }
            
            // 繪製 P2
            if (p2Img.complete) {
                ctx.save();
                ctx.scale(-1, 1);
                ctx.drawImage(p2Img, -p2.x - p2.w, p2.y, p2.w, p2.h);
                ctx.restore();
            }
            if (p2.isAttacking) {
                ctx.fillStyle = "red";
                ctx.fillRect(p2.x - 80, p2.y + 40, 80, 20); // 特效放大
            }

            // 放大字體
            ctx.fillStyle = "white";
            ctx.font = "30px Arial";
            ctx.fillText("P1 HP: " + p1.hp, 50, 50);
            ctx.fillText("P2 HP: " + p2.hp, 600, 50);
            
            requestAnimationFrame(draw);
        }

        window.addEventListener('touchstart', (e) => {
            if (e.touches[0].clientX < 400) { // 調整觸控偵測範圍
                p1.isAttacking = true;
                p2.hp -= 5;
                setTimeout(() => { p1.isAttacking = false; }, 200);
            } else {
                p2.isAttacking = true;
                p1.hp -= 5;
                setTimeout(() => { p2.isAttacking = false; }, 200);
            }
        });

        p1Img.onload = draw;
        p2Img.onload = draw;
        draw();
    </script>
</body>
</html>
