<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samurai Duel</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 800px; height: 400px; border: 4px solid #333; overflow: hidden; }
        #gameCanvas { display: block; width: 800px; height: 400px; }
        
        /* 精美 UI */
        .hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; z-index: 10; }
        .hp-bar { width: 300px; height: 30px; background: #222; border: 2px solid #fff; }
        .hp-fill { height: 100%; width: 100%; transition: width 0.3s ease; }
        #hp1-fill { background: linear-gradient(90deg, #00d2ff, #3a7bd5); }
        #hp2-fill { background: linear-gradient(90deg, #ffcc00, #ff9900); }
        
        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; flex-direction:column; justify-content:center; align-items:center; color:white; font-size:40px; z-index:20; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div>P1<div class="hp-bar"><div id="hp1-fill" class="hp-fill"></div></div></div>
        <div>P2<div class="hp-bar"><div id="hp2-fill" class="hp-fill"></div></div></div>
    </div>
    <div id="overlay">
        <div id="result">PLAYER 1 WINS!</div>
        <p style="font-size: 20px; cursor: pointer;" onclick="resetGame()">TAP TO RESTART</p>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // 確保 GitHub 檔案名稱為 player.PNG 與 enemy.PNG
    const p1Img = new Image(); p1Img.src = 'player.PNG'; 
    const p2Img = new Image(); p2Img.src = 'enemy.PNG';

    let p1 = { x: 80, y: 150, frame: 0, isAttacking: false, hp: 100 };
    let p2 = { x: 520, y: 150, frame: 0, isAttacking: false, hp: 100 };
    let gameOver = false;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // P1 繪製 (紅面具武士 -> 藍色特效)
        let p1Sx = p1.isAttacking ? p1.frame * 200 : 0;
        ctx.drawImage(p1Img, p1Sx, 0, 200, 200, p1.x, p1.y, 220, 220);
        if (p1.isAttacking) {
            ctx.globalCompositeOperation = 'screen';
            ctx.drawImage(p1Img, 0, 200, 400, 200, p1.x + 80, p1.y, 300, 200);
            ctx.globalCompositeOperation = 'source-over';
        }

        // P2 繪製 (流浪者 -> 黃色特效)
        ctx.save(); ctx.scale(-1, 1);
        let p2Sx = p2.isAttacking ? p2.frame * 200 : 0;
        ctx.drawImage(p2Img, p2Sx, 0, 200, 200, -p2.x - 220, p2.y, 220, 220);
        if (p2.isAttacking) {
            ctx.globalCompositeOperation = 'screen';
            ctx.drawImage(p2Img, 0, 200, 400, 200, -p2.x - 450, p2.y, 300, 200);
            ctx.globalCompositeOperation = 'source-over';
        }
        ctx.restore();

        if (!gameOver) requestAnimationFrame(draw);
    }

    function attack(attacker, target, hpId) {
        if (attacker.isAttacking || gameOver) return;
        attacker.isAttacking = true; attacker.frame = 0;
        target.hp -= 20;
        document.getElementById(hpId).style.width = target.hp + "%";
        
        if (target.hp <= 0) {
            gameOver = true;
            document.getElementById("overlay").style.display = "flex";
            document.getElementById("result").innerText = (attacker === p1 ? "PLAYER 1" : "PLAYER 2") + " WINS!";
        }
        
        let count = 0;
        let timer = setInterval(() => {
            attacker.frame++;
            if (count++ >= 3) { clearInterval(timer); attacker.isAttacking = false; }
        }, 100);
    }

    function resetGame() {
        p1.hp = 100; p2.hp = 100; gameOver = false;
        document.getElementById("hp1-fill").style.width = "100%";
        document.getElementById("hp2-fill").style.width = "100%";
        document.getElementById("overlay").style.display = "none";
        draw();
    }

    window.addEventListener('touchstart', (e) => {
        if (gameOver) return;
        if (e.touches[0].clientX < 400) attack(p1, p2, "hp2-fill");
        else attack(p2, p1, "hp1-fill");
    });

    let loaded = 0;
    const check = () => { if (++loaded === 2) draw(); };
    p1Img.onload = check; p2Img.onload = check;
</script>
</body>
</html>
